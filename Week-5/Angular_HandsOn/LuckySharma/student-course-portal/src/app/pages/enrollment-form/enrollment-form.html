<h2>Student Enrollment Request</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <div>
    <label>Student Name:</label>
    <input type="text" name="studentName" [(ngModel)]="studentName"
           required minlength="3" #nameCtrl="ngModel">
    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required</span>
    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span>
  </div>

  <div>
    <label>Student Email:</label>
    <input type="email" name="studentEmail" [(ngModel)]="studentEmail"
           required email #emailCtrl="ngModel">
    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">Email is required</span>
    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">Enter a valid email</span>
  </div>

  <div>
    <label>Course ID:</label>
    <input type="number" name="courseId" [(ngModel)]="courseId"
           required #courseIdCtrl="ngModel">
    <span *ngIf="courseIdCtrl.touched && courseIdCtrl.errors?.['required']">Course ID is required</span>
  </div>

  <div>
    <label>Preferred Semester:</label>
    <select name="preferredSemester" [(ngModel)]="preferredSemester">
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <div>
    <label>
      <input type="checkbox" name="agreeToTerms" [(ngModel)]="agreeToTerms"
             required #termsCtrl="ngModel">
      I agree to the terms
    </label>
    <span *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">You must agree to the terms</span>
  </div>

  <div *ngIf="submitted">
    <p>Enrollment request submitted successfully!</p>
  </div>

  <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
  <button type="button" (click)="enrollForm.resetForm()">Reset</button>

</form>
