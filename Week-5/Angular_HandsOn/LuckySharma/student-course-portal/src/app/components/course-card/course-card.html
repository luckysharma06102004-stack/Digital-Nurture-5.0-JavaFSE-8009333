<div class="course-card"
     [ngClass]="{ 'card--enrolled': (isEnrolled$ | async), 'card--full': course.credits >= 4, 'expanded': isExpanded }"
     [ngStyle]="{ 'border-left': '5px solid ' + (course.gradeStatus === 'passed' ? 'green' : course.gradeStatus === 'failed' ? 'red' : 'grey') }"
     appHighlight
     (click)="onCardClick()">
  <h3>{{ course.name }}</h3>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits | creditLabel }}</p>
  <p>ID: {{ course.id }}</p>

  <div [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="badge badge--passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge badge--failed">Failed</span>
    <span *ngSwitchCase="'pending'" class="badge badge--pending">Pending</span>
    <span *ngSwitchDefault class="badge">Unknown</span>
  </div>

  <button (click)="onEnrollClick($event)">{{ (isEnrolled$ | async) ? 'Unenroll' : 'Enroll' }}</button>
  <button (click)="onShowDetailsClick($event)">Show Details</button>
</div>
